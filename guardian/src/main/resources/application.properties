# =====================================================
# FILE: application.properties
# PURPOSE: Configuration settings for Spring Boot.
#
# Spring Boot reads this file on startup.
# Lines starting with # are comments (ignored by Spring).
# =====================================================

# The port our web server listens on.
# Default is 8080. Change it if 8080 is already in use.
server.port=8080

# Application name (shown in logs)
spring.application.name=Guardian

# ===== LOGGING SETTINGS =====
# Controls how much detail appears in the console.
# Options: ERROR, WARN, INFO, DEBUG, TRACE
# INFO is good for development — not too noisy, not too quiet.
logging.level.root=INFO
logging.level.com.guardian=DEBUG

# ===== CORS SETTINGS =====
# CORS = Cross-Origin Resource Sharing
# This allows our HTML file to call the Java APIs even if served from a different port.
# (Already handled in the @CrossOrigin annotation, but good to know about)

# ===== STATIC FILES =====
# Spring Boot automatically serves files from src/main/resources/static/
# So our index.html at static/index.html is served at http://localhost:8080/
spring.web.resources.static-locations=classpath:/static/
