# =====================================================
# Guardian - Application Configuration
# =====================================================

server.port=8080
spring.application.name=Guardian

# =====================================================
# DATABASE SETTINGS (SQLite)
# =====================================================

# MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/guardian_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Chetan@0451
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tell Hibernate we are using MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# update = auto creates table on first run
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console? (true = yes, false = no)
spring.jpa.show-sql=false

# =====================================================
# LOGGING
# =====================================================
logging.level.root=INFO
logging.level.com.guardian=DEBUG
logging.level.org.hibernate.SQL=WARN
